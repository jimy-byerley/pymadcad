# CI workflow: runs tests on every push/PR
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Rust checks
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run Rust tests
        run: cargo test

  # Build and test Python package
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build with maturin
        run: uvx maturin build --release
      - name: Install wheel and test deps
        run: uv pip install --system target/wheels/*.whl pytest pnprint
      - name: Run Python tests
        run: python -m pytest ${{ github.workspace }}/tests/ -v
        working-directory: /tmp
