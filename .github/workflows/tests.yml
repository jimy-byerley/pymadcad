# runs tests on every push/PR
name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Rust checks
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run Rust tests
        run: cargo test

  # Build and test Python package
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install OpenGL
        run: |
          sudo apt-get install -y libegl1-mesa-dev libgl1-mesa-dri
      - name: Build and install
        run: |
          uv sync --extra dev --extra ply --extra stl --extra obj
          uv run maturin develop --release --strip
      - name: Run Python tests
        env:
          MADCAD_VISUALCHECK: 'false'
        run: |
          cp -r ${{ github.workspace }}/tests /tmp/tests
          ${{ github.workspace }}/.venv/bin/python -m pytest /tmp/tests/ -v --ignore=/tmp/tests/test_displays.py --ignore=/tmp/tests/test_display_voxel.py
        working-directory: /tmp

  # Build documentation
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build and install
        run: |
          uv sync --extra dev --extra docs
          uv run maturin develop --release --strip
      - name: Build docs
        run: uv run mkdocs build --strict
