site_name: pymadcad
site_description: Simple yet powerful CAD library, written with Python.
repo_url: https://github.com/jimy-byerley/pymadcad

theme:
  name: material
  logo: logo.png
  favicon: logo.ico
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.tabs.sticky
    - navigation.footer
    - content.code.annotate
    - content.code.copy
    - content.code.select

hooks:
  - docs/screenshot_remove_backgrounds.py

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          load_external_modules: true
          options:
            docstring_style: google
            show_source: true
            members_order: source
            show_root_heading: true
            show_root_full_path: false
            allow_inspection: true
            show_if_no_docstring: true
            merge_init_into_class: true
            preload_modules:
              - pyglm
              - glm


extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jimy-byerley/pymadcad
      name: Pymadcad on Github

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Installation: installation.md
  - Concepts: concepts.md
  - Guide:
    - Overview: guide/overview.md
    - Good Practices: guide/goodpractices.md
    - Generation: guide/generation.md
    - Manipulation: guide/manipulation.md
    - Kinematic: guide/kinematic.md
    - Display: guide/display.md
    - Read/Write: guide/io.md
  - Reference:
    - Math Utilities: reference/mathutils.md
    - Mesh:
      - reference/mesh/index.md
      - Mesh: reference/mesh/mesh.md
      - Web: reference/mesh/web.md
      - Wire: reference/mesh/wire.md
    - Kinematic: reference/kinematic.md
    - Joints: reference/joints.md
    - Assembly: reference/assembly.md
    - Primitives: reference/primitives.md
    - Constraints: reference/constraints.md
    - Generation: reference/generation.md
    - Offseting: reference/offseting.md
    - Blending: reference/blending.md
    - Bevel: reference/bevel.md
    - Boolean: reference/boolean.md
    - Reverse: reference/reverse.md
    - Hull: reference/hull.md
    - IO: reference/io.md
    - Settings: reference/settings.md
    - Hashing: reference/hashing.md
    - Rendering: reference/rendering.md
    - Scheme: reference/scheme.md
    - Text: reference/text.md
    - Standard: reference/standard.md
    - Gear: reference/gear.md
  - Algorithms: algorithms.md
  - Development: development.md
